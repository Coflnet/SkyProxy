# ═══════════════════════════════════════════════════════════════════════
# SkyProxy CI — calls the org-wide reusable container-ci workflow.
#
# SECURITY: This file only REFERENCES the reusable workflow.
# - Image name: derived from repo name (docker.io/muehlhansfl/skyproxy)
# - Registry creds: stored in Coflnet/.github, not here
# - Scan enforcement: in the reusable workflow, cannot be bypassed
# ═══════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  container-ci:
    uses: Coflnet/.github/.github/workflows/container-ci.yml@main
    with:
      dockerfile: ./Dockerfile
      context: .
      platforms: linux/amd64
      repo_url: https://github.com/Coflnet/k8s
      k8s_file: main/sky/chart/charts/sky-proxy/values.yaml
